# Brave Configuration - Server Deployment
# Designed for high-performance server environments with ample resources:
# faster discovery cadence and larger chunk sizes for high-throughput,
# low-latency workloads.

# Service Discovery - Aggressive configuration
discovery:
    enabled: true
    service_type: "_lumen._tcp"
    domain: "local"
    deployment_id: "local"
    resolve_timeout: 5s # Fast resolve timeout
    connect_timeout: 5s # Fast operational dial timeout
    rediscovery_backoff_min: 5s # Faster rediscovery cooldown
    rediscovery_backoff_max: 1m # Shorter maximum cooldown
    scan_interval: 15s # Re-query mDNS frequently for a dynamic fleet
    mdns_enabled: true # Discover nodes on the LAN via mDNS
    broker_url: "" # Set to also/instead consume a Host Broker's /v1/nodes/watch
    static_nodes: [] # e.g. ["10.0.0.5:50051"] to pin fixed node addresses

# Server - REST API
server:
    rest:
        enabled: true
        host: "0.0.0.0"
        port: 5866
        cors: true # Enable CORS for web interfaces

# Logging - Comprehensive logging
logging:
    level: "info" # Standard logging level
    format: "json" # JSON format for structured logging, e.g. for log aggregation
    output: "stdout"

# Chunking - Larger chunks for a fast, low-latency network
chunk:
    enable_auto: true
    threshold: 4194304 # 4 MiB — hold off chunking longer on a fast network
    max_chunk_bytes: 1048576 # 1 MiB per chunk

# Optimizations for Server Deployments:
# - Frequent mDNS discovery for a dynamic fleet of nodes
# - Fast connection and rediscovery timeouts for responsive failover
# - Larger chunk thresholds/sizes suited to high-bandwidth links
# - Structured logging for log aggregation systems
