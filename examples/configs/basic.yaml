# Basic Configuration - Personal Computers
# Standard settings close to config.DefaultConfig(), suitable for a typical
# personal computer running lumen-hostd or an SDK-embedding application.

# Service Discovery - Standard configuration
discovery:
    enabled: true
    service_type: "_lumen._tcp"
    domain: "local"
    deployment_id: "local"
    resolve_timeout: 10s # Standard resolve timeout
    connect_timeout: 10s # Standard operational dial timeout
    rediscovery_backoff_min: 10s # Initial rediscovery cooldown
    rediscovery_backoff_max: 2m # Maximum rediscovery cooldown
    scan_interval: 30s # How often to re-query mDNS for services
    mdns_enabled: true # Discover nodes on the LAN via mDNS
    broker_url: "" # Set to also/instead consume a Host Broker's /v1/nodes/watch
    static_nodes: [] # e.g. ["10.0.0.5:50051"] to pin fixed node addresses

# Host Broker control plane
broker:
    enabled: true
    host: "0.0.0.0"
    port: 5866

# Logging - Standard logging
logging:
    level: "info" # Standard logging level
    format: "json" # JSON format for structured logging
    output: "stdout"

# Chunking - Standard payload chunking
chunk:
    enable_auto: true # Automatically chunk large payloads
    threshold: 1048576 # 1 MiB — payloads larger than this get chunked
    max_chunk_bytes: 262144 # 256 KiB per chunk

# Features for Personal Computers:
# - Standard mDNS discovery frequency
# - Good balance of discovery latency and network chatter
# - Structured JSON logging for debugging
# - Standard timeouts and payload chunk sizes
