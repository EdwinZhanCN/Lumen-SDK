# Lightweight Configuration - Small Computers (Intel N100, NAS)
# Designed for small form-factor computers with moderate resources.

# Service Discovery - Balanced configuration
discovery:
    enabled: true
    service_type: "_lumen._tcp"
    domain: "local"
    deployment_id: "local"
    resolve_timeout: 15s # Moderate resolve timeout
    connect_timeout: 10s # Standard operational dial timeout
    rediscovery_backoff_min: 15s # Moderate rediscovery cooldown
    rediscovery_backoff_max: 3m # Conservative maximum cooldown
    scan_interval: 45s # Less frequent mDNS re-query to save CPU
    mdns_enabled: true # Discover nodes on the LAN via mDNS
    broker_url: "" # Set to also/instead consume a Host Broker's /v1/nodes/watch
    static_nodes: [] # e.g. ["10.0.0.5:50051"] to pin fixed node addresses

# Host Broker control plane
broker:
    enabled: true
    host: "0.0.0.0"
    port: 5866

# Logging - Balanced verbosity
logging:
    level: "info" # Standard logging level
    format: "json" # JSON format for structured logging
    output: "stdout"

# Chunking - Standard payload chunking
chunk:
    enable_auto: true
    threshold: 1048576 # 1 MiB
    max_chunk_bytes: 262144 # 256 KiB per chunk

# Optimizations for Lightweight Devices:
# - Moderate mDNS discovery frequency to save CPU
# - Conservative rediscovery backoff on flaky networks
# - Structured logging with JSON format
