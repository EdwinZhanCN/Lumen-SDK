name: Release

on:
    push:
        tags:
            - "v*"

env:
    GO_VERSION: "1.25"

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Cache Go modules
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cache/go-build
                      ~/go/pkg/mod
                  key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-

            - name: Download dependencies
              run: go mod download

            - name: Run tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v3
              with:
                  file: ./coverage.out
                  token: ${{ secrets.CODECOV_TOKEN }}

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        strategy:
            matrix:
                goos: [linux, darwin, windows]
                goarch: [amd64, arm64]
                exclude:
                    - goos: windows
                      goarch: arm64
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v4
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Build
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  mkdir -p dist
                  VERSION=${{ github.ref_name }}
                  COMMIT=${{ github.sha }}
                  BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  EXT=""
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    EXT=".exe"
                  fi

                  # Build lumenhubd with complete version info
                  CGO_ENABLED=0 go build \
                    -ldflags="-X 'main.Version=$VERSION' -X 'main.Commit=$COMMIT' -X 'main.BuildTime=$BUILD_TIME' -s -w" \
                    -o "dist/lumenhubd${EXT}" \
                    ./cmd/lumenhubd

                  # Build lumenhub with complete version info
                  CGO_ENABLED=0 go build \
                    -ldflags="-X 'github.com/edwinzhancn/lumen-sdk/cmd/lumenhub/cmd.Version=$VERSION' -X 'github.com/edwinzhancn/lumen-sdk/cmd/lumenhub/cmd.Commit=$COMMIT' -X 'github.com/edwinzhancn/lumen-sdk/cmd/lumenhub/cmd.BuildTime=$BUILD_TIME' -s -w" \
                    -o "dist/lumenhub${EXT}" \
                    ./cmd/lumenhub

            - name: Create archive
              run: |
                  cd dist
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    7z a lumenhub-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip lumenhubd.exe lumenhub.exe
                  else
                    tar -czf lumenhub-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz lumenhubd lumenhub
                  fi

            - uses: actions/upload-artifact@v4
              with:
                  name: lumenhub-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/lumenhub-*.*

    build-gateway-mac:
        name: Build macOS Gateway App
        runs-on: macos-14
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 18

            - name: Install Wails CLI
              run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.96

            - name: Install Frontend Dependencies
              run: |
                  cd cmd/lumen-gateway/frontend
                  npm install

            - name: Build and Package macOS App (Universal)
              run: |
                  cd cmd/lumen-gateway
                  wails3 task darwin:package:universal

            - name: Create Archive
              run: |
                  cd cmd/lumen-gateway/bin
                  VERSION=${GITHUB_REF#refs/tags/}
                  zip -r "lumen-gateway-${VERSION}-darwin-universal.zip" "Lumen Gateway.app"

            - name: Upload macOS Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: lumen-gateway-darwin-universal
                  path: cmd/lumen-gateway/bin/lumen-gateway-*-darwin-universal.zip

    build-gateway-windows:
        name: Build Windows Gateway App
        runs-on: windows-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 18

            - name: Install Wails CLI
              run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.96

            - name: Install Frontend Dependencies
              run: |
                  cd cmd/lumen-gateway/frontend
                  npm install

            - name: Build and Package Windows App
              run: |
                  cd cmd/lumen-gateway
                  wails3 task windows:build

            - name: Prepare Release Executable
              shell: bash
              run: |
                  cd cmd/lumen-gateway/bin
                  VERSION=${GITHUB_REF#refs/tags/}
                  cp "Lumen Gateway.exe" "Lumen-Gateway-${VERSION}-windows-amd64.exe"

            - name: Upload Windows Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: lumen-gateway-windows-amd64
                  path: cmd/lumen-gateway/bin/Lumen-Gateway-*-windows-amd64.exe

    release:
        permissions:
            contents: write
        name: Create Release
        runs-on: ubuntu-latest
        needs: [test, build, build-gateway-mac, build-gateway-windows]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: List downloaded artifacts
              run: find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" \)

            - name: Get version
              id: version
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Create release notes
              id: release_notes
              run: |
                  # Generate release notes from commit history since last tag
                  PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
                  if [ -n "$PREV_TAG" ]; then
                    NOTES=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
                  else
                    NOTES=$(git log --pretty=format:"- %s (%h)")
                  fi
                  {
                    echo 'notes<<EOF'
                    echo "$NOTES"
                    echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.version.outputs.VERSION }}
                  name: Release ${{ steps.version.outputs.VERSION }}
                  body: |
                      # Lumen Hub ${{ steps.version.outputs.VERSION }}

                      ## 🖥️ Lumen Gateway (GUI)

                      Lumen Gateway is a cross-platform system tray application that runs in the background and hosts the daemon, routing strategies, and an interactive React-based network discovery dashboard.

                      ### macOS Installation (Universal)
                      1. Download `lumen-gateway-${{ steps.version.outputs.VERSION }}-darwin-universal.zip`.
                      2. Unzip the file and move `Lumen Gateway.app` to your `/Applications` folder.
                      3. Right-click the app and choose **Open** (or run `xattr -d com.apple.quarantine "/Applications/Lumen Gateway.app"` to bypass Gatekeeper).

                      ### Windows Installation (AMD64)
                      1. Download `Lumen-Gateway-${{ steps.version.outputs.VERSION }}-windows-amd64.exe`.
                      2. Double-click to run. The gateway will run in your system tray on port `5866` (configurable).

                      ## 🚀 Installation

                      ### Download Binaries
                      ```bash
                      # Linux AMD64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/lumenhub-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz | tar xz
                      sudo install -m 0755 lumenhubd lumenhub /usr/local/bin/

                      # Linux ARM64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/lumenhub-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz | tar xz
                      sudo install -m 0755 lumenhubd lumenhub /usr/local/bin/

                      # macOS AMD64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/lumenhub-${{ steps.version.outputs.VERSION }}-darwin-amd64.tar.gz | tar xz
                      xattr -d com.apple.quarantine lumenhubd lumenhub 2>/dev/null || true
                      sudo install -m 0755 lumenhubd lumenhub /usr/local/bin/
                      sudo xattr -d com.apple.quarantine /usr/local/bin/lumenhubd /usr/local/bin/lumenhub 2>/dev/null || true

                      # macOS ARM64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/lumenhub-${{ steps.version.outputs.VERSION }}-darwin-arm64.tar.gz | tar xz
                      xattr -d com.apple.quarantine lumenhubd lumenhub 2>/dev/null || true
                      sudo install -m 0755 lumenhubd lumenhub /usr/local/bin/
                      sudo xattr -d com.apple.quarantine /usr/local/bin/lumenhubd /usr/local/bin/lumenhub 2>/dev/null || true
                      ```

                      macOS builds are currently unsigned/not notarized. If you download the archive with a browser or another tool that adds Gatekeeper quarantine, remove it before installing:

                      ```bash
                      xattr -d com.apple.quarantine lumenhubd lumenhub 2>/dev/null || true
                      ```

                      ## 📋 Changes
                      ${{ steps.release_notes.outputs.notes }}

                      ---
                      📖 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
                  draft: false
                  prerelease: false
                  files: |
                      artifacts/**/*.tar.gz
                      artifacts/**/*.zip
                      artifacts/**/*.exe

            - name: Update latest tag
              if: startsWith(github.ref, 'refs/tags/')
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git tag -f latest
                  git push -f origin latest
