name: Release

on:
    push:
        tags:
            - "v*.*.*"

env:
    GO_VERSION: '1.25'

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Download dependencies
              run: go mod download

            - name: Verify dependencies
              run: go mod verify

            - name: Run tests
              run: go test -v -race ./...

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        permissions:
            contents: read
        strategy:
            matrix:
                goos: [linux, darwin, windows]
                goarch: [amd64, arm64]
                exclude:
                    - goos: windows
                      goarch: arm64
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Build
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  mkdir -p dist
                  VERSION=${{ github.ref_name }}
                  COMMIT=${{ github.sha }}
                  BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  EXT=""
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    EXT=".exe"
                  fi

                  # Build lumen-hostd with complete version info
                  CGO_ENABLED=0 go build \
                    -ldflags="-X 'main.Version=$VERSION' -X 'main.Commit=$COMMIT' -X 'main.BuildTime=$BUILD_TIME' -s -w" \
                    -o "dist/lumen-hostd${EXT}" \
                    ./cmd/lumen-hostd

            - name: Create archive
              run: |
                  cd dist
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    7z a lumen-hostd-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip lumen-hostd.exe
                  else
                    tar -czf lumen-hostd-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz lumen-hostd
                  fi

            - uses: actions/upload-artifact@v4
              with:
                  name: lumen-hostd-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/lumen-hostd-*.*

    release:
        permissions:
            contents: write
        name: Create Release
        runs-on: ubuntu-latest
        needs: [test, build]
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: List downloaded artifacts
              run: find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" \)

            - name: Create Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  generate_release_notes: true
                  body: |
                      # Lumen Host Broker ${{ github.ref_name }}

                      `lumen-hostd` discovers Lumen inference nodes on the LAN via mDNS and
                      republishes them over `/v1/nodes/watch` for applications that cannot
                      perform local-network discovery themselves (e.g. inside Docker Desktop).
                      It is a discovery-only control-plane process — it never proxies
                      inference payloads.

                      ## 🚀 Installation

                      ### Download and install
                      ```bash
                      # Linux AMD64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/lumen-hostd-${{ github.ref_name }}-linux-amd64.tar.gz | tar xz
                      sudo install -m 0755 lumen-hostd /usr/local/bin/

                      # Linux ARM64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/lumen-hostd-${{ github.ref_name }}-linux-arm64.tar.gz | tar xz
                      sudo install -m 0755 lumen-hostd /usr/local/bin/

                      # macOS AMD64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/lumen-hostd-${{ github.ref_name }}-darwin-amd64.tar.gz | tar xz
                      xattr -d com.apple.quarantine lumen-hostd 2>/dev/null || true
                      sudo install -m 0755 lumen-hostd /usr/local/bin/
                      sudo xattr -d com.apple.quarantine /usr/local/bin/lumen-hostd 2>/dev/null || true

                      # macOS ARM64
                      curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/lumen-hostd-${{ github.ref_name }}-darwin-arm64.tar.gz | tar xz
                      xattr -d com.apple.quarantine lumen-hostd 2>/dev/null || true
                      sudo install -m 0755 lumen-hostd /usr/local/bin/
                      sudo xattr -d com.apple.quarantine /usr/local/bin/lumen-hostd 2>/dev/null || true

                      # Windows AMD64: download lumen-hostd-${{ github.ref_name }}-windows-amd64.zip and unzip
                      ```

                      macOS builds are currently unsigned/not notarized. If you download the archive with a browser or another tool that adds Gatekeeper quarantine, remove it before installing:

                      ```bash
                      xattr -d com.apple.quarantine lumen-hostd 2>/dev/null || true
                      ```

                      ### Run as a background service
                      ```bash
                      lumen-hostd install   # registers a per-user background service (LaunchAgent / systemd user unit / Task Scheduler) and starts it
                      lumen-hostd status    # check install/running state
                      lumen-hostd doctor    # diagnose discovery and reachability issues
                      lumen-hostd uninstall # remove the background service
                      ```

                      Or run it in the foreground (e.g. in a container): `lumen-hostd serve`.

                      ---
                      📖 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
                  draft: false
                  prerelease: false
                  files: |
                      artifacts/**/*.tar.gz
                      artifacts/**/*.zip
