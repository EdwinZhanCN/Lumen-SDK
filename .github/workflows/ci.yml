name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main]

env:
    GO_VERSION: '1.25'

permissions:
    contents: read

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Download dependencies
              run: go mod download

            - name: Verify dependencies
              run: go mod verify

            - name: Run tests
              run: go test -v -race -coverprofile=coverage.out ./...

            - name: Run vet
              run: go vet ./...

            - name: Upload coverage to Codecov
              if: ${{ env.CODECOV_TOKEN != '' }}
              uses: codecov/codecov-action@v6
              with:
                  files: ./coverage.out
                  token: ${{ env.CODECOV_TOKEN }}

    build:
        name: Build
        runs-on: ubuntu-latest
        strategy:
            matrix:
                goos: [linux, darwin, windows]
                goarch: [amd64, arm64]
                exclude:
                    - goos: windows
                      goarch: arm64
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Build binary
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  mkdir -p dist

                  # Get version information
                  VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "dev")
                  COMMIT=${{ github.sha }}
                  BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                  # Build lumen-hostd with version info
                  CGO_ENABLED=0 go build \
                    -ldflags="-X 'main.Version=$VERSION' -X 'main.Commit=$COMMIT' -X 'main.BuildTime=$BUILD_TIME' -s -w" \
                    -o dist/lumen-hostd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} \
                    ./cmd/lumen-hostd

            - name: Test binary execution
              if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
              run: |
                  # Test help and version commands
                  ./dist/lumen-hostd-${{ matrix.goos }}-${{ matrix.goarch }} --help

                  echo "=== Testing lumen-hostd version ==="
                  ./dist/lumen-hostd-${{ matrix.goos }}-${{ matrix.goarch }} version
